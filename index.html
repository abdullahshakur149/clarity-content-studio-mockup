<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="studio-text/studio-text.css?v=4">
<link rel="stylesheet" href="studio-image/studio-image.css?v=4">
<link rel="stylesheet" href="studio-video/studio-video.css?v=4">
<link rel="stylesheet" href="studio-audio/studio-audio.css?v=1">
<style>
/* Reset & tokens */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, textarea, select { font-family: inherit; }
a { text-decoration: none; color: inherit; }

:root {
  --bg: #0e1320;
  --card: #171d2e;
  --card2: #1c2337;
  --primary: #6366f1;
  --primary-hover: #818cf8;
  --primary-dim: rgba(99,102,241,0.15);
  --text: #e8eaf2;
  --muted: #9aa0b4;
  --border: #262c40;
  --accent: #34d399;
  --warning: #f59e0b;
  --danger: #f87171;
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar-w: 220px;
}

/* Shell */
#app { display: flex; flex-direction: row; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
#main { display: flex; flex-direction: column; flex: 1; min-width: 0; overflow: hidden; }
#content { flex: 1; overflow-y: auto; overflow-x: hidden; background: var(--bg); }

#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100vh;
  background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto; padding: 0 0 12px; flex-shrink: 0;
}
.sidebar-group-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 14px 16px 4px; }
.sidebar-brand { padding: 22px 16px 18px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
.sidebar-brand-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--primary); line-height: 1; }
.sidebar-brand-tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-top: 6px; }
.sidebar-brand-edition { display: inline-block; margin-top: 8px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: var(--primary-dim); color: var(--primary-hover); border: 1px solid rgba(99,102,241,0.25); }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 7px 16px; font-size: 13px; color: var(--muted); cursor: pointer; position: relative; transition: all 0.15s; }
.sidebar-item:hover { background: var(--primary-dim); color: var(--text); }
.sidebar-item.active { background: var(--primary-dim); color: var(--text); }
.sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--primary); border-radius: 0 2px 2px 0; }
.sidebar-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

/* Shared UI */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-green { background: rgba(52,211,153,0.12); color: #34d399; }
.pill-indigo { background: var(--primary-dim); color: var(--primary-hover); }
.pill-amber { background: rgba(245,158,11,0.12); color: #f59e0b; }
.pill-red { background: rgba(248,113,113,0.12); color: #f87171; }
.pill-muted { background: rgba(154,160,180,0.12); color: var(--muted); }
.screen { padding: 28px; min-height: 100%; }
.screen-header { margin-bottom: 24px; }
.screen-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--text); }
.screen-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
.mono { font-family: 'DM Mono', monospace; font-size: 11px; }
.tag { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 11px; border: 1px solid var(--border); color: var(--muted); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; transition: all 0.15s; cursor: pointer; border: 1px solid transparent; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline { border-color: var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--primary); color: var(--text); }
.btn-ghost { color: var(--muted); }
.btn-ghost:hover { color: var(--text); background: var(--primary-dim); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.modal-close { color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-close:hover { color: var(--text); }

/* Wizard steps (Text + Image) */
.wizard-steps { display: flex; align-items: center; gap: 0; margin-bottom: 28px; }
.wizard-step { display: flex; align-items: center; }
.wiz-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.wiz-dot.done { background: var(--accent); color: #fff; }
.wiz-dot.active { background: var(--primary); color: #fff; box-shadow: 0 0 0 3px var(--primary-dim); }
.wiz-dot.pending { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }
.wiz-line { height: 2px; width: 40px; background: var(--border); }
.wiz-line.done { background: var(--accent); }
.wiz-label { font-size: 10px; color: var(--muted); margin-top: 6px; white-space: nowrap; }

/* Toggles */
.toggle-sw { width: 36px; height: 20px; background: var(--border); border-radius: 10px; position: relative; transition: all 0.2s; cursor: pointer; flex-shrink: 0; }
.toggle-sw.on { background: var(--primary); }
.toggle-knob { width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: all 0.2s; }
.toggle-sw.on .toggle-knob { left: 18px; }

/* Persona fit */
.pf-chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; }
.pf-chip.green { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
.pf-chip.amber { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
.pf-chip.red { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.pf-chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.pf-breakdown { display: flex; flex-direction: column; gap: 8px; }
.pf-dim { display: flex; align-items: center; gap: 10px; }
.pf-dim-name { width: 100px; font-size: 11px; color: var(--muted); }
.pf-dim-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
.pf-dim-fill { height: 100%; border-radius: 3px; background: var(--primary); }
.pf-dim-val { width: 32px; text-align: right; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }

/* Compliance + brand voice (Text wizard) */
.ch-compliance { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-family: 'DM Mono', monospace; }
.ch-compliance.ok { background: rgba(52,211,153,0.1); color: #34d399; }
.ch-compliance.warn { background: rgba(245,158,11,0.1); color: #f59e0b; }
.ch-compliance.fail { background: rgba(248,113,113,0.1); color: #f87171; }
.bv-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
.bv-meter-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; margin-bottom: 4px; }
.bv-meter-fill { height: 100%; border-radius: 4px; }
.bv-meter-fill.good { background: #34d399; }
.bv-meter-fill.warn { background: #f59e0b; }

/* Evidence rail (Text wizard) */
.evidence-item { padding: 10px 12px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); margin-bottom: 8px; }
.evidence-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 4px; margin-bottom: 6px; display: inline-block; }
.evidence-tag.research { background: rgba(99,102,241,0.12); color: var(--primary-hover); }
.evidence-tag.social { background: rgba(245,158,11,0.12); color: #f59e0b; }
.evidence-text { font-size: 12px; color: var(--text); line-height: 1.5; }
.evidence-source { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* Approvals (Audio) */
.approval-rail { display: flex; flex-direction: column; gap: 8px; }
.approval-step { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); }
.approval-step.done { border-color: rgba(52,211,153,0.35); background: rgba(52,211,153,0.06); }
.approval-step.active { border-color: var(--primary); background: var(--primary-dim); }
.approval-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.approval-icon.done { background: rgba(52,211,153,0.15); color: #34d399; }
.approval-icon.active { background: var(--primary-dim); color: var(--primary-hover); }
.approval-meta { flex: 1; }
.approval-name { font-size: 12px; font-weight: 600; color: var(--text); }
.approval-who { font-size: 11px; color: var(--muted); }

/* Audio studio */
.audio-chapter-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.audio-chapter { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); cursor: pointer; }
.audio-chapter.playing { border-color: #34d399; background: rgba(52,211,153,0.06); }
.audio-ch-num { width: 20px; height: 20px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.audio-ch-num.playing { background: #34d399; color: #fff; }
.audio-ch-title { flex: 1; font-size: 12px; color: var(--text); }
.audio-ch-dur { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }

/* ===== Home hub (creation entry) ===== */
.home-wrap { max-width: 980px; margin: 0 auto; padding: 56px 28px 48px; }
.home-head { text-align: center; margin-bottom: 40px; }
.home-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.home-title { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 700; line-height: 1.05; color: var(--text); }
.home-sub { font-size: 15px; color: var(--muted); margin: 14px auto 0; max-width: 580px; line-height: 1.6; }
.home-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
.home-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; position: relative; overflow: hidden; cursor: pointer; transition: border-color .15s, transform .15s; }
.home-card:hover { border-color: var(--studio-accent); transform: translateY(-2px); }
.home-card::before { content: ''; position: absolute; inset: 0 0 auto 0; height: 3px; background: var(--studio-accent); }
.home-card-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: color-mix(in srgb, var(--studio-accent) 16%, transparent); margin-bottom: 16px; }
.home-card-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--text); }
.home-card-tag { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; min-height: 38px; }
.home-card-ex { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
.home-card-chip { font-size: 11px; color: var(--muted); background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; }
.home-card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
.home-card-cta { font-size: 13px; font-weight: 600; color: var(--studio-accent); }
.home-card-browse { font-size: 12px; color: var(--muted); cursor: pointer; }
.home-card-browse:hover { color: var(--text); }

/* ===== Content Engine screen ===== */
.eng-head { text-align: center; margin-bottom: 28px; }
.eng-strategy { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 34px; }
.eng-strat-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.eng-strat-barlabel { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.eng-strat-edit { font-size: 12px; color: var(--primary-hover); cursor: pointer; }
.eng-strat-edit:hover { text-decoration: underline; }
.eng-strat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.eng-strat-card { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.eng-strat-head { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.eng-strat-ic { font-size: 15px; }
.eng-strat-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.eng-strat-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.eng-strat-body { font-size: 12px; color: var(--muted); line-height: 1.5; }
.eng-types-head { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--text); text-align: center; margin-bottom: 16px; }
.eng-types { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.eng-type-card { background: var(--card); border: 1px solid var(--border); border-radius: 13px; padding: 20px 18px; cursor: pointer; position: relative; overflow: hidden; transition: border-color .15s, transform .15s; }
.eng-type-card:hover { border-color: var(--studio-accent); transform: translateY(-2px); }
.eng-type-card::before { content: ''; position: absolute; inset: 0 0 auto 0; height: 3px; background: var(--studio-accent); }
.eng-type-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: color-mix(in srgb, var(--studio-accent) 16%, transparent); margin-bottom: 12px; }
.eng-type-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--text); }
.eng-type-tag { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.45; min-height: 52px; }
.eng-type-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.eng-type-cta { font-size: 13px; font-weight: 600; color: var(--studio-accent); }
@media (max-width: 860px) { .eng-types, .eng-strat-grid { grid-template-columns: repeat(2, 1fr); } }

/* ===== Studio Create / Library tabs ===== */
.studio-tabbar { display: flex; align-items: center; gap: 16px; margin: 0 0 22px; }
.studio-back { font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; }
.studio-back:hover { color: var(--text); }
.studio-tabs { display: inline-flex; gap: 4px; background: var(--card2); border: 1px solid var(--border); border-radius: 9px; padding: 4px; }
.studio-tab { padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
.studio-tab:hover { color: var(--text); }
.studio-tab.active { background: var(--card); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.35); }

/* ===== Create launchpad (per studio) ===== */
.create-hero { max-width: 540px; margin: 24px auto 40px; text-align: center; padding: 44px 38px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; position: relative; overflow: hidden; }
.create-hero::before { content: ''; position: absolute; top: -40%; left: 50%; transform: translateX(-50%); width: 320px; height: 320px; background: radial-gradient(circle, var(--studio-accent), transparent 70%); opacity: .12; pointer-events: none; }
.create-hero-icon { width: 60px; height: 60px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; background: color-mix(in srgb, var(--studio-accent) 18%, transparent); margin-bottom: 18px; position: relative; }
.create-hero h2 { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 700; color: var(--text); position: relative; }
.create-hero-sub { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.55; position: relative; }
.create-hero-strategy { margin-top: 22px; padding: 14px; border: 1px dashed var(--border); border-radius: 12px; background: var(--card2); position: relative; }
.create-hero-strategy-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.create-hero-chips { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.inherit-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text); background: color-mix(in srgb, var(--studio-accent) 14%, var(--card)); border: 1px solid color-mix(in srgb, var(--studio-accent) 35%, transparent); border-radius: 20px; padding: 4px 11px; }
.create-hero-cta { margin-top: 24px; padding: 11px 26px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; background: var(--studio-accent); color: var(--studio-ink, #fff); border: none; position: relative; cursor: pointer; }
.create-hero-cta:hover { filter: brightness(1.08); }
.create-hero-alt { margin-top: 14px; font-size: 12px; color: var(--muted); cursor: pointer; position: relative; }
.create-hero-alt:hover { color: var(--text); text-decoration: underline; }
</style>
</head>
<body>
<!-- Convenience links (separate pages) -->
<!-- /studio-text/  /studio-image/  /studio-video/  /studio-audio/ -->
<!-- ===================== APP SHELL ===================== -->
<div id="app">
  <div id="sidebar"></div>
  <div id="main">
    <div id="content"></div>
  </div>
</div>

<script>
/* ===================== STATE (no browser storage) ===================== */
var appState = {
  screen: 'engine'
};

/* ===================== NAVIGATION ===================== */
function nav(screen) {
  appState.screen = screen;
  renderSidebar();
  renderContent();
  try { history.replaceState(null, '', '#/enterprise/' + screen); } catch(e) {}
}

/* ===================== SIDEBAR ===================== */
var STUDIO_NAV = [
  { group: 'Workspace' },
  { id: 'engine',                icon: '&#9889;', label: 'Content Engine' },
];

function renderSidebar() {
  var html = '<div class="sidebar-brand">'
    + '<div class="sidebar-brand-name">Clarity</div>'
    + '<div class="sidebar-brand-tag">Content Studio</div>'
    + '<span class="sidebar-brand-edition">Core</span>'
    + '</div>';
  STUDIO_NAV.forEach(function(item) {
    if (item.group) {
      html += '<div class="sidebar-group-label">' + item.group + '</div>';
    } else {
      var onStudio = appState.screen.indexOf('studio-') === 0;
      var active = (appState.screen === item.id || (item.id === 'engine' && onStudio)) ? ' active' : '';
      var badge = item.badge ? '<span class="sidebar-badge">' + item.badge + '</span>' : '';
      html += '<div class="sidebar-item' + active + '" onclick="nav(\'' + item.id + '\')">'
            + '<span class="icon">' + item.icon + '</span>'
            + item.label + badge
            + '</div>';
    }
  });
  document.getElementById('sidebar').innerHTML = html;
}

/* ===================== CONTENT ROUTER ===================== */
var STUDIO_SCREEN_IDS = ['engine', 'studio-text', 'studio-image', 'studio-video', 'studio-audio'];

function renderContent() {
  var el = document.getElementById('content');
  var s = appState.screen;
  var html;
  switch (s) {
    case 'engine': html = screenEngine(); break;
    case 'studio-image': html = screenStudioImage(); break;
    case 'studio-video': html = screenStudioVideo(); break;
    case 'studio-audio': html = screenStudioAudio(); break;
    default: html = screenStudioText(); break;
  }
  el.innerHTML = html;
}

/* ===================== HOME HUB + SHARED CREATION HELPERS ===================== */
var HOME_STUDIOS = [
  { key: 'text',  name: 'Studio Text',  icon: '&#9997;&#65039;', accent: '#6366f1', ink: '#ffffff', tag: 'Emails, newsletters, blogs and social posts — written in your brand voice.', ex: ['Email', 'Newsletter', 'Blog', 'Caption'] },
  { key: 'image', name: 'Studio Image', icon: '&#128247;',       accent: '#f59e0b', ink: '#0e1320', tag: 'On-brand visuals and social creative, generated and refined on a layer canvas.', ex: ['Feed', 'Story', 'Poster', 'Ad'] },
  { key: 'video', name: 'Studio Video', icon: '&#127909;',       accent: '#f87171', ink: '#0e1320', tag: 'Short-form reels and long-form video with an AI go-to-market strategy.', ex: ['Reel', 'Short', 'YouTube', 'Ad'] },
  { key: 'audio', name: 'Studio Audio', icon: '&#127908;',       accent: '#34d399', ink: '#0e1320', tag: 'Podcasts, voiceovers and audio ads — start from a goal, not a blank track.', ex: ['Podcast', 'Voiceover', 'Ad', 'Narration'] }
];
var STUDIO_PREFIX = { text: 'st', image: 'si', video: 'sv', audio: 'sa' };
var STUDIO_OPENER = { text: 'stStartWizard', image: 'siStartWizard', video: 'svNewVideo', audio: 'saNewAudio' };

/* Inherited strategy — the "previous 4-step" pillars, shown as dummy data so they
   are never re-entered inside a creation flow. */
var ENGINE_STRATEGY = {
  brand: 'Hearth Bakery',
  cards: [
    { label: 'Persona', icon: '🎯', title: 'The Artisan Loyalist', body: '28–45, values craft &amp; provenance. Shops local weekly, follows makers, pays a premium for transparency.' },
    { label: 'Market Intelligence', icon: '📈', title: 'Craft demand is rising', body: 'Premium local-bakery demand +18% YoY. Mass-produced fatigue is high; the open gap is honest behind-the-craft storytelling.' },
    { label: 'Positioning', icon: '✨', title: 'Quality over volume', body: 'Slow-fermented, community-first. We win on trust and story — not on price or scale.' }
  ]
};

function screenEngine() {
  var strat = ENGINE_STRATEGY.cards.map(function (c) {
    return '<div class="eng-strat-card">'
      + '<div class="eng-strat-head"><span class="eng-strat-ic">' + c.icon + '</span><span class="eng-strat-label">' + c.label + '</span></div>'
      + '<div class="eng-strat-title">' + c.title + '</div>'
      + '<div class="eng-strat-body">' + c.body + '</div>'
      + '</div>';
  }).join('');
  var types = HOME_STUDIOS.map(function (s) {
    return '<div class="eng-type-card" style="--studio-accent:' + s.accent + '" onclick="homeCreate(\'' + s.key + '\')">'
      + '<div class="eng-type-icon">' + s.icon + '</div>'
      + '<div class="eng-type-name">' + s.name.replace('Studio ', '') + '</div>'
      + '<div class="eng-type-tag">' + s.tag + '</div>'
      + '<div class="eng-type-foot"><span class="eng-type-cta">Start →</span>'
      + '<span class="home-card-browse" onclick="event.stopPropagation();homeBrowse(\'' + s.key + '\')">Library</span></div>'
      + '</div>';
  }).join('');
  return '<div class="screen"><div class="home-wrap">'
    + '<div class="eng-head">'
    + '<div class="home-eyebrow">Content Engine</div>'
    + '<h1 class="home-title">Let\'s make something that lands.</h1>'
    + '<p class="home-sub">Your strategy is already loaded. Pick a format and Clarity takes you straight to go-to-market — no re-entering personas or research.</p>'
    + '</div>'
    + '<div class="eng-strategy">'
    + '<div class="eng-strat-bar"><span class="eng-strat-barlabel">◷ Your strategy · ' + ENGINE_STRATEGY.brand + '</span>'
    + '<span class="eng-strat-edit" title="Inherited from your Strategy module">Edit strategy</span></div>'
    + '<div class="eng-strat-grid">' + strat + '</div>'
    + '</div>'
    + '<div class="eng-types-head">What do you want to create?</div>'
    + '<div class="eng-types">' + types + '</div>'
    + '</div></div>';
}

function homeCreate(key) {
  appState[STUDIO_PREFIX[key] + 'Tab'] = 'create';
  appState.screen = 'studio-' + key;
  renderSidebar();
  var fn = window[STUDIO_OPENER[key]];
  if (typeof fn === 'function') { fn(); } else { renderContent(); }
  try { history.replaceState(null, '', '#/enterprise/studio-' + key); } catch (e) {}
}

function homeBrowse(key) {
  appState[STUDIO_PREFIX[key] + 'Tab'] = 'library';
  nav('studio-' + key);
}

/* Segmented Create | My Library control rendered at the top of each studio */
function studioTabsBar(prefix, active) {
  active = active || 'create';
  function tab(id, label) {
    return '<div class="studio-tab' + (active === id ? ' active' : '') + '" onclick="setStudioTab(\'' + prefix + '\',\'' + id + '\')">' + label + '</div>';
  }
  return '<div class="studio-tabbar">'
    + '<span class="studio-back" onclick="nav(\'engine\')">‹ Content Engine</span>'
    + '<div class="studio-tabs">' + tab('create', '✦ Create') + tab('library', '▦ My Library') + '</div>'
    + '</div>';
}

function setStudioTab(prefix, tab) {
  appState[prefix + 'Tab'] = tab;
  renderContent();
}

/* Create-tab launchpad hero shared by all four studios */
function studioLaunchpad(o) {
  return '<div class="create-hero" style="--studio-accent:' + o.accent + ';--studio-ink:' + (o.ink || '#fff') + '">'
    + '<div class="create-hero-icon">' + o.icon + '</div>'
    + '<h2>' + o.title + '</h2>'
    + '<p class="create-hero-sub">' + o.sub + '</p>'
    + '<div class="create-hero-strategy">'
    + '<div class="create-hero-strategy-label">Auto-applied from your strategy</div>'
    + '<div class="create-hero-chips">'
    + '<span class="inherit-chip">◷ Persona</span>'
    + '<span class="inherit-chip">◷ Market intel</span>'
    + '<span class="inherit-chip">◷ GTM strategy</span>'
    + '</div>'
    + '</div>'
    + '<button class="create-hero-cta" onclick="' + o.open + '()">' + o.cta + ' →</button>'
    + '<div class="create-hero-alt" onclick="setStudioTab(\'' + o.prefix + '\',\'library\')">or browse your library</div>'
    + '</div>';
}

/* ===================== INIT ===================== */
function init() {
  var h = window.location.hash;
  if (h && h.startsWith('#/')) {
    var parts = h.slice(2).split('/');
    if (parts.length >= 2) {
      var screen = parts[1];
      if (parts[0] === 'smb' || STUDIO_SCREEN_IDS.indexOf(screen) === -1) screen = 'engine';
      nav(screen);
      return;
    }
  }
  renderSidebar();
  renderContent();
}
window.addEventListener('load', init);

</script>
<script src="studio-text/studio-text.js?v=7"></script>
<script src="studio-image/studio-image.js?v=6"></script>
<script src="studio-video/studio-video.js?v=5"></script>
<script src="studio-audio/studio-audio.js?v=2"></script>
<script>StudioText.init(appState); StudioImage.init(appState); StudioVideo.init(appState); StudioAudio.init(appState);</script>
